name: Publish Dalamud Plugins

on:
  schedule:
    # Every hour at minute 17; adjust as desired.
    - cron: '17 * * * *'

  workflow_dispatch:
    inputs:
      tool:
        description: 'Which plugin(s) to publish'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - BardToolbox
          - MidiBard2
          - MasterOfPuppets
      force:
        description: 'Re-upload/rebuild even if the current upstream version already has a release tag'
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: publish-dalamud-plugins
  cancel-in-progress: false

jobs:
  publish:
    name: Publish plugins
    runs-on: ubuntu-latest

    env:
      DOTNET_NOLOGO: true
      TOOL_SELECTION: ${{ github.event_name == 'workflow_dispatch' && inputs.tool || 'all' }}
      FORCE_REPUBLISH: ${{ github.event_name == 'workflow_dispatch' && inputs.force || 'false' }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'
          dotnet-quality: 'ga'

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish/refresh plugin releases and pluginmaster.json
        shell: bash
        run: |
          chmod +x scripts/publish-dalamud.sh
          scripts/publish-dalamud.sh

      - name: Commit updated pluginmaster.json
        shell: bash
        run: |
          if git diff --quiet -- pluginmaster.json; then
            echo "pluginmaster.json unchanged"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add pluginmaster.json
          git commit -m "Update pluginmaster.json"
          git push