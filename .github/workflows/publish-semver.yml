name: Publish Semver

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing semver tag to publish, without a v prefix
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-semver-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish semver release
    runs-on: ubuntu-latest

    env:
      DOTNET_NOLOGO: true
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      SOURCE_REF: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.SOURCE_REF }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Create GitHub App token for BardToolbox
        id: bardtoolbox_app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BARDTOOLBOX_APP_ID }}
          private-key: ${{ secrets.BARDTOOLBOX_APP_PRIVATE_KEY }}
          owner: pffxivtools
          repositories: |
            BardToolbox

      - name: Generate release assets and manifest
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          PUBLISH_SCHEME: semver
          BARDTOOLBOX_GH_TOKEN: ${{ steps.bardtoolbox_app_token.outputs.token }}
        run: bash scripts/publish-release.sh

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish NuGet packages
        shell: bash
        run: |
          shopt -s nullglob
          packages=(dist/github/assets/*.nupkg)
          if [[ "${#packages[@]}" -eq 0 ]]; then
            echo "No NuGet packages were generated"
            exit 1
          fi

          dotnet nuget push "${packages[@]}" \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SOURCE_REF: ${{ env.SOURCE_REF }}
        shell: bash
        run: |
          set -Eeuo pipefail

          release="$(jq -c '.releases[0]' dist/github/metadata/releases.json)"
          tag="$(jq -r '.tag' <<<"${release}")"
          title="$(jq -r '.title' <<<"${release}")"

          custom_notes_file="$(mktemp)"
          combined_notes_file="$(mktemp)"

          jq -r '.notes' <<<"${release}" > "${custom_notes_file}"
          mapfile -t assets < <(jq -r '.assets[]' <<<"${release}")

          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "No GitHub release assets were generated"
            exit 1
          fi

          generate_notes() {
            gh api \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              "/repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              -f tag_name="${tag}" \
              -f target_commitish="${tag}" \
              --jq '.body'
          }

          if gh release view "${tag}" >/dev/null 2>&1; then
            generated_notes="$(generate_notes)"

            {
              cat "${custom_notes_file}"
              echo
              echo "---"
              echo
              printf '%s\n' "${generated_notes}"
            } > "${combined_notes_file}"

            gh release upload "${tag}" "${assets[@]}" --clobber
            gh release edit "${tag}" --title "${title}" --notes-file "${combined_notes_file}"
          else
            gh release create "${tag}" "${assets[@]}" \
              --title "${title}" \
              --generate-notes \
              --notes "$(cat "${custom_notes_file}")" \
              --latest
          fi

      - name: Commit pluginmaster.json to default branch
        shell: bash
        run: |
          cp dist/github/pluginmaster.json "${RUNNER_TEMP}/pluginmaster.json"
          git fetch origin "${DEFAULT_BRANCH}"
          git checkout -B "${DEFAULT_BRANCH}" "origin/${DEFAULT_BRANCH}"
          cp "${RUNNER_TEMP}/pluginmaster.json" pluginmaster.json

          if git diff --quiet -- pluginmaster.json; then
            echo "pluginmaster.json unchanged"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pluginmaster.json
          git commit -m "Update pluginmaster.json for ${RELEASE_VERSION}"
          git push origin "HEAD:${DEFAULT_BRANCH}"
