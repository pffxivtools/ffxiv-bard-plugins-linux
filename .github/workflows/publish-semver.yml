name: Publish Semver

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing semver tag to publish, without a v prefix
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-semver-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish semver release
    runs-on: ubuntu-latest

    env:
      DOTNET_NOLOGO: true
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      SOURCE_REF: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.SOURCE_REF }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Create publish fixtures for act
        if: ${{ env.ACT == 'true' }}
        shell: bash
        run: |
          set -Eeuo pipefail
          bash scripts/test-publish-fixtures.sh .github/act/fixtures/publish

      - name: Create GitHub App token for BardToolbox
        id: bardtoolbox_app_token
        if: ${{ env.ACT != 'true' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BARDTOOLBOX_APP_ID }}
          private-key: ${{ secrets.BARDTOOLBOX_APP_PRIVATE_KEY }}
          owner: pffxivtools
          repositories: |
            BardToolbox

      - name: Generate release assets and manifest
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          PUBLISH_SCHEME: semver
          PUBLISH_CONTEXT: ${{ env.ACT == 'true' && 'local' || 'release' }}
          BARDTOOLBOX_LOCAL_DIR: ${{ env.ACT == 'true' && format('{0}/.github/act/fixtures/publish/BardToolbox', github.workspace) || '' }}
          MIDIBARD2_PLUGINMASTER: ${{ env.ACT == 'true' && format('file://{0}/.github/act/fixtures/publish/manifests/MidiBard2.pluginmaster.json', github.workspace) || '' }}
          MASTEROFPUPPETS_PLUGINMASTER: ${{ env.ACT == 'true' && format('file://{0}/.github/act/fixtures/publish/manifests/MasterOfPuppets.pluginmaster.json', github.workspace) || '' }}
          GH_TOKEN: ${{ env.ACT == 'true' && 'act-dry-run' || steps.bardtoolbox_app_token.outputs.token }}
          BARDTOOLBOX_GH_TOKEN: ${{ env.ACT == 'true' && 'act-dry-run' || steps.bardtoolbox_app_token.outputs.token }}
        run: bash scripts/publish-release.sh

      - name: Validate semver release payload
        shell: bash
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -Eeuo pipefail
          bash scripts/validate-publish-output.sh \
            --mode semver \
            --release-tag "${RELEASE_VERSION}" \
            --output-root dist/github \
            --github-repository "${GITHUB_REPOSITORY}"

      - name: NuGet login (OIDC → temp API key)
        if: ${{ env.ACT != 'true' }}
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish NuGet packages
        if: ${{ env.ACT != 'true' }}
        shell: bash
        run: |
          shopt -s nullglob
          packages=(dist/github/assets/*.nupkg)
          if [[ "${#packages[@]}" -eq 0 ]]; then
            echo "No NuGet packages were generated"
            exit 1
          fi

          dotnet nuget push "${packages[@]}" \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Prepare release notes
        shell: bash
        env:
          GH_TOKEN: ${{ env.ACT == 'true' && 'act-dry-run' || secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -Eeuo pipefail

          release="$(jq -c '.releases[0]' dist/github/metadata/releases.json)"
          title="$(jq -r '.title' <<<"${release}")"

          jq -r '.notes' <<<"${release}" > dist/github/metadata/custom-notes.md

          if [[ "${ACT:-false}" == "true" ]]; then
            {
              cat dist/github/metadata/custom-notes.md
              echo
              echo "---"
              echo
              echo "ACT dry-run autogenerated notes placeholder for ${RELEASE_VERSION}"
            } > dist/github/metadata/release-notes.md
          else
            {
              cat dist/github/metadata/custom-notes.md
              echo
              echo "---"
              echo
              gh api \
                -X POST \
                -H "Accept: application/vnd.github+json" \
                "/repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
                -f tag_name="${RELEASE_VERSION}" \
                -f target_commitish="${GITHUB_SHA}" \
                --jq '.body'
            } > dist/github/metadata/release-notes.md
          fi

          echo "RELEASE_TITLE=${title}" >> "$GITHUB_ENV"

      - name: Dry-run semver publish summary
        if: ${{ env.ACT == 'true' }}
        shell: bash
        run: |
          set -Eeuo pipefail
          echo "ACT dry-run: semver publish workflow validated"
          jq -r '.releases[] | "- \(.tag): \(.title)"' dist/github/metadata/releases.json
          find dist/github -maxdepth 3 -type f | sort

      - name: Publish GitHub release
        if: ${{ env.ACT != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: ${{ env.RELEASE_TITLE }}
          body_path: dist/github/metadata/release-notes.md
          generate_release_notes: true
          files: |
            dist/github/assets/*
          make_latest: true

      - name: Validate published GitHub release
        if: ${{ env.ACT != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -Eeuo pipefail
          bash scripts/validate-published-release.sh \
            --mode semver \
            --tag "${RELEASE_VERSION}" \
            --repo "${GITHUB_REPOSITORY}" \
            --metadata-file dist/github/metadata/releases.json

      - name: Commit pluginmaster.json to default branch
        if: ${{ env.ACT != 'true' }}
        shell: bash
        run: |
          cp dist/github/pluginmaster.json "${RUNNER_TEMP}/pluginmaster.json"
          git fetch origin "${DEFAULT_BRANCH}"
          git checkout -B "${DEFAULT_BRANCH}" "origin/${DEFAULT_BRANCH}"
          cp "${RUNNER_TEMP}/pluginmaster.json" pluginmaster.json

          if git diff --quiet -- pluginmaster.json; then
            echo "pluginmaster.json unchanged"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pluginmaster.json
          git commit -m "Update pluginmaster.json for ${RELEASE_VERSION}"
          git push origin "HEAD:${DEFAULT_BRANCH}"

      - name: Validate committed pluginmaster.json
        if: ${{ env.ACT != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -Eeuo pipefail
          bash scripts/validate-published-release.sh \
            --mode semver \
            --tag "${RELEASE_VERSION}" \
            --repo "${GITHUB_REPOSITORY}" \
            --metadata-file dist/github/metadata/releases.json \
            --expected-pluginmaster-file dist/github/pluginmaster.json \
            --default-branch "${DEFAULT_BRANCH}"
