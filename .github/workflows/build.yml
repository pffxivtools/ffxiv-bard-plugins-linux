name: Build

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    env:
      DOTNET_NOLOGO: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore TinyIpc.Shim.sln

      - name: Build
        run: dotnet build TinyIpc.Shim.sln --no-restore -v minimal

      - name: Run native test subset
        run: >
          dotnet test XivIpc.Tests/XivIpc.Tests.csproj --no-build --framework net9.0 -v minimal
          --filter "FullyQualifiedName~XivIpc.Tests.FunctionalTests|FullyQualifiedName~XivIpc.Tests.ParallelFunctionalTests|FullyQualifiedName~XivIpc.Tests.SidecarLifecycleTests"

      - name: Validate publish scripts
        run: >
          bash -n
          scripts/release-common.sh
          scripts/publish-local.sh
          scripts/publish-release.sh
          scripts/test-publish-fixtures.sh
          scripts/validate-publish-output.sh
          scripts/validate-published-release.sh
