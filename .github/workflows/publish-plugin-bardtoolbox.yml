name: Publish BardToolbox

on:
  schedule:
    - cron: '7 0 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: Re-upload the asset if the release already exists
        required: true
        default: false
        type: boolean

concurrency:
  group: publish-bardtoolbox
  cancel-in-progress: false

jobs:
  publish:
    uses: ./.github/workflows/publish-plugin-reusable.yml
    with:
      plugin_name: BardToolbox
      force: ${{ github.event_name == 'workflow_dispatch' && inputs.force || false }}
      use_bardtoolbox_app: true
    secrets: inherit
