name: Publish Plugins

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      tool:
        description: Which plugin(s) to publish
        required: true
        default: all
        type: choice
        options:
          - all
          - BardToolbox
          - MidiBard2
          - MasterOfPuppets
      force:
        description: Re-upload the asset if the release already exists
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: publish-plugins
  cancel-in-progress: false

jobs:
  publish:
    name: Publish plugin tracking releases
    runs-on: ubuntu-latest

    env:
      DOTNET_NOLOGO: true
      TOOL_SELECTION: ${{ github.event_name == 'workflow_dispatch' && inputs.tool || 'all' }}
      FORCE_REPUBLISH: ${{ github.event_name == 'workflow_dispatch' && inputs.force || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Create GitHub App token for BardToolbox
        id: bardtoolbox_app_token
        if: ${{ env.TOOL_SELECTION == 'all' || env.TOOL_SELECTION == 'BardToolbox' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BARDTOOLBOX_APP_ID }}
          private-key: ${{ secrets.BARDTOOLBOX_APP_PRIVATE_KEY }}
          owner: pffxivtools
          repositories: |
            BardToolbox

      - name: Generate plugin assets and manifest
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          PUBLISH_SCHEME: plugins
          GH_TOKEN: ${{ steps.bardtoolbox_app_token.outputs.token }}
          BARDTOOLBOX_GH_TOKEN: ${{ steps.bardtoolbox_app_token.outputs.token }}
        run: bash scripts/publish-release.sh

      - name: Build release matrix
        id: releases
        shell: bash
        run: |
          set -Eeuo pipefail

          jq -c '{include: [.releases[] | {
            tag: .tag,
            title: .title,
            notes_file: ("dist/github/metadata/" + .tag + ".notes.md"),
            asset_glob: (.assets | join("\n"))
          }]}' dist/github/metadata/releases.json > releases-matrix.json

          jq -r '.releases[] | .notes' dist/github/metadata/releases.json >/dev/null

          jq -c '.releases[]' dist/github/metadata/releases.json | while IFS= read -r release; do
            tag="$(jq -r '.tag' <<<"${release}")"
            jq -r '.notes' <<<"${release}" > "dist/github/metadata/${tag}.notes.md"
          done

          echo "matrix=$(cat releases-matrix.json)" >> "$GITHUB_OUTPUT"

      - name: Commit updated pluginmaster.json
        shell: bash
        run: |
          if git diff --quiet -- pluginmaster.json; then
            echo "pluginmaster.json unchanged"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pluginmaster.json
          git commit -m "Update pluginmaster.json"
          git push

  publish_releases:
    name: Publish ${{ matrix.tag }}
    needs: publish
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.publish.outputs.matrix) }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.tag }}
          name: ${{ matrix.title }}
          body_path: ${{ matrix.notes_file }}
          generate_release_notes: true
          files: ${{ matrix.asset_glob }}
          prerelease: true
          make_latest: false
          overwrite_files: ${{ github.event_name == 'workflow_dispatch' && inputs.force || false }}